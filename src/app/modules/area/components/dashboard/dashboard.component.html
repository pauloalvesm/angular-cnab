<div class="container mt-4">
  <div class="row mb-4">
    <div class="col-12">
      <h2 class="mb-2 page-title fw-bold ps-3">Dashboard</h2>
      <hr class="text-secondary opacity-25">
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card shadow-sm border-0 bg-white p-3">
        <small class="text-muted fw-bold d-block mb-1">TOTAL BALANCE</small>
        <h4 class="fw-bold text-success mb-0">{{ totalBalance | currency:'BRL' }}</h4>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm border-0 bg-white p-3">
        <small class="text-muted fw-bold d-block mb-1">ACTIVE STORES</small>
        <h4 class="fw-bold text-info mb-0">{{ storeCount }}</h4>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm border-0 bg-white p-3">
        <small class="text-muted fw-bold d-block mb-1">TOTAL TRANSACTIONS</small>
        <h4 class="fw-bold text-primary mb-0">{{ transactionCount }}</h4>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-4">
      <div class="card shadow-sm border-0 p-4">
        <h5 class="fw-bold mb-3 details-page">Store Distribution</h5>
        <app-store-distribution-chart></app-store-distribution-chart>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm border-0 p-4">
        <h5 class="fw-bold mb-3 details-page">Transactions Overview</h5>
        <app-transaction-chart></app-transaction-chart>
      </div>
    </div>
  </div>
</div>
