<div class="modal fade" id="transactionDeleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 shadow">

      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">
          <i class="bi bi-exclamation-triangle me-2"></i>Delete Transaction
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body p-4 text-center">
        <p class="mb-1 text-secondary small">Are you sure you want to delete this record?</p>
        <h6 class="fw-bold text-dark mb-0">
          {{ selectedTransaction?.storeName }} - {{ selectedTransaction?.amount | currency:'BRL' }}
        </h6>
        <p class="text-muted small mt-2">CPF: {{ selectedTransaction?.cpf }}</p>
      </div>

      <div class="modal-footer bg-light border-0 d-flex justify-content-center">
        <button #closeBtn type="button" class="btn btn-secondary px-4" title="No" data-bs-dismiss="modal">
          No
        </button>
        <button type="button" class="btn btn-danger px-4" title="Yes, Delete" (click)="confirmDelete()" [disabled]="isDeleting">
          <span *ngIf="isDeleting" class="spinner-border spinner-border-sm me-1"></span>
          Yes, Delete
        </button>
      </div>

    </div>
  </div>
</div>
