<div class="modal fade" id="storeDetailsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">

      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">
          <i class="bi bi-shop me-2"></i>Store Details
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-4">
        <div *ngIf="isLoading" class="text-center py-5">
          <div class="spinner-border text-success" role="status"></div>
          <p class="mt-2 mb-0 text-muted">Fetching store data...</p>
        </div>

        <div *ngIf="!isLoading && store">
          <div class="mb-4 text-center">
             <i class="bi bi-info-circle text-green-1 fs-1"></i>
             <h4 class="details-page fw-bold mt-2">{{ store.name }}</h4>
          </div>

          <div class="card bg-light border-0">
            <div class="card-body">
              <div class="mb-3">
                <label class="small text-muted d-block fw-bold">
                  <span class="modal-label">Store Name</span>
                </label>
                <span class="fs-5">{{ store.name }}</span>
              </div>

              <div class="mb-0">
                <label class="small text-muted d-block fw-bold">
                  <span class="modal-label">Owner Name</span>
                </label>
                <span class="fs-5">{{ store.ownerName }}</span>
              </div>
            </div>
          </div>

          <div class="mt-4 pt-3 border-top text-center">
            <p class="small text-secondary mb-0">
               <i class="bi bi-calendar-check me-1"></i>
               Registered Store Record
            </p>
          </div>
        </div>
      </div>

      <div class="modal-footer bg-light border-0">
        <button type="button" class="btn btn-dark" data-bs-dismiss="modal" title="Close">
          <i class="bi bi-x-circle me-1"></i> Close
        </button>
      </div>
    </div>
  </div>
</div>
