<div class="container mt-2">
  <div class="card shadow-sm border-0">

    <div class="card-header bg-white py-2 px-0">
      <h2 class="mb-2 page-title fw-bold ps-3">Store</h2>

      <div class="d-flex align-items-center py-2">
        <span class="text-secondary small me-3 fw-normal">
          <i class="bi bi-question-circle me-1"></i>Need to register a new store?
        </span>
        <button class="btn btn-primary btn-sm d-flex align-items-center shadow-sm"
                data-bs-toggle="modal"
                data-bs-target="#storeCreateModal">
          <i class="bi bi-plus-lg me-1"></i> Add Store
        </button>
      </div>

      <div class="d-flex justify-content-start">
        <div class="search-container">
          <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input
              type="text"
              class="form-control border-start-0 ps-0"
              placeholder="Search by Name or Owner..."
              [(ngModel)]="searchTerm"
              (input)="onSearchChange()">

            <button
              class="btn btn-outline-danger border-start-0"
              type="button"
              title="Clear filters and reset pagination"
              (click)="onClearFilters()">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th class="ps-4">Name</th>
              <th>Owner</th>
              <th class="text-center" style="width: 150px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="isLoading">
              <td colspan="3" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 mb-0">Loading data...</p>
              </td>
            </tr>

            <tr *ngFor="let store of paginatedStores">
              <td class="ps-4">{{ store.name }}</td>
              <td>{{ store.ownerName }}</td>
              <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                  <button
                    class="btn btn-primary btn-sm"
                    title="Edit"
                    data-bs-toggle="modal"
                    data-bs-target="#storeUpdateModal"
                    (click)="prepareEdit(store)">
                    <i class="bi bi-pencil-square"></i>
                  </button>

                  <button
                    class="btn btn-outline-danger btn-sm"
                    title="Delete"
                    data-bs-toggle="modal"
                    data-bs-target="#storeDeleteModal"
                    (click)="prepareDelete(store)">
                    <i class="bi bi-trash"></i>
                  </button>

                </div>
              </td>
            </tr>

            <tr *ngIf="!isLoading && filteredStores.length === 0">
              <td colspan="3" class="text-center py-4 text-muted">
                No records found {{ searchTerm ? 'for "' + searchTerm + '"' : '' }}.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card-footer bg-white border-0 pb-4">
        <app-pagination
          [currentPage]="currentPage"
          [totalItems]="filteredStores.length"
          [itemsPerPage]="itemsPerPage"
          (pageChanged)="onPageChange($event)">
        </app-pagination>
    </div>

  </div>
</div>

<app-store-create (storeCreated)="loadStores()"></app-store-create>
<app-store-update (storeUpdated)="loadStores()"></app-store-update>
<app-store-delete (storeDeleted)="loadStores()"></app-store-delete>
