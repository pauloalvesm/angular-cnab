<div class="modal fade" id="storeDeleteModal" tabindex="-1" aria-labelledby="storeDeleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title" id="storeDeleteModalLabel">
          <i class="bi bi-exclamation-triangle me-2"></i>Delete Store
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body p-4 text-center">
        <p class="mb-1 text-secondary">Are you sure you want to delete this store?</p>
        <h6 class="fw-bold text-dark">{{ selectedStore?.name }}</h6>
      </div>

      <div class="modal-footer bg-light border-0 d-flex justify-content-center">
        <button #closeBtn type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">
          No
        </button>
        <button type="button" class="btn btn-danger px-4" (click)="confirmDelete()" [disabled]="isDeleting">
          <span *ngIf="isDeleting" class="spinner-border spinner-border-sm me-1"></span>
          Yes, Delete
        </button>
      </div>
    </div>
  </div>
</div>
